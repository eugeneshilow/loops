<svg width="100%" viewBox="0 0 680 470" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif">
<title>How loops installs: repo to setup to running loops</title>
<desc>Clone github.com/eugeneshilow/loops and run the setup skill once. It wires up your own Telegram (api keys from my.telegram.org + a QR login) and local transcription, then installs and runs any loop on your machine: tg-contacts-feedback and tg-comments-feedback.</desc>
<defs>
  <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1,1 L9,5 L1,9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="170" y="42" width="340" height="60" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
<text x="340" y="69" text-anchor="middle" font-size="15" font-weight="500" fill="#2C2C2A">github.com/eugeneshilow/loops</text>
<text x="340" y="89" text-anchor="middle" font-size="12.5" fill="#5F5E5A">the loops + the setup skill</text>

<line x1="340" y1="102" x2="340" y2="138" stroke="#888780" stroke-width="1.5" marker-end="url(#ar)"/>
<text x="354" y="125" font-size="12.5" fill="#5F5E5A">1 · clone + run setup</text>

<rect x="190" y="138" width="300" height="60" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
<text x="340" y="165" text-anchor="middle" font-size="15" font-weight="500" fill="#3C3489">setup — your installer</text>
<text x="340" y="185" text-anchor="middle" font-size="12.5" fill="#534AB7">lives in your coding agent</text>

<line x1="340" y1="198" x2="340" y2="234" stroke="#888780" stroke-width="1.5" marker-end="url(#ar)"/>
<text x="354" y="221" font-size="12.5" fill="#5F5E5A">2 · wires up + installs any loop</text>

<rect x="170" y="234" width="340" height="96" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1"/>
<text x="192" y="259" font-size="15" font-weight="500" fill="#2C2C2A">the loops — run on your machine</text>
<text x="200" y="285" font-size="12.5" fill="#5F5E5A">·  tg-contacts-feedback</text>
<text x="200" y="307" font-size="12.5" fill="#5F5E5A">·  tg-comments-feedback</text>

<rect x="120" y="352" width="440" height="76" rx="10" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1"/>
<text x="340" y="375" text-anchor="middle" font-size="12.5" font-weight="500" fill="#633806">setup does what npx alone can't — the real-world wiring:</text>
<text x="340" y="396" text-anchor="middle" font-size="12.5" fill="#854F0B">api keys (my.telegram.org) · QR-login to your own Telegram</text>
<text x="340" y="414" text-anchor="middle" font-size="12.5" fill="#854F0B">· local whisper · tester handles</text>
</svg>
